<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="officeWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4C9B8"/>
      <stop offset="70%" stop-color="#A89884"/>
      <stop offset="100%" stop-color="#6B5D4D"/>
    </linearGradient>
    <linearGradient id="sunset" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#FFB347" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFD93D" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFECBA" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B6F47"/>
      <stop offset="50%" stop-color="#6B5335"/>
      <stop offset="100%" stop-color="#4A3728"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D2D2D"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5DADE2"/>
      <stop offset="50%" stop-color="#85C1E9"/>
      <stop offset="100%" stop-color="#AED6F1"/>
    </linearGradient>
    <filter id="cartoonShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 办公室背景墙 -->
  <rect width="1600" height="1000" fill="url(#officeWall)"/>
  
  <!-- 黄昏夕阳 - 从窗户透入 -->
  <ellipse cx="1300" cy="300" rx="300" ry="200" fill="url(#sunset)"/>
  
  <!-- 大窗户 -->
  <g opacity="0.9">
    <rect x="1100" y="100" width="400" height="450" fill="#4A5568" stroke="#2D3748" stroke-width="8"/>
    <rect x="1115" y="115" width="180" height="200" fill="url(#screenGrad)" opacity="0.7"/>
    <rect x="1305" y="115" width="180" height="200" fill="url(#screenGrad)" opacity="0.7"/>
    <rect x="1115" y="325" width="180" height="215" fill="#3498DB" opacity="0.5"/>
    <rect x="1305" y="325" width="180" height="215" fill="#3498DB" opacity="0.5"/>
    <!-- 窗框 -->
    <line x1="1295" y1="100" x2="1295" y2="550" stroke="#2D3748" stroke-width="6"/>
    <line x1="1100" y1="315" x2="1500" y2="315" stroke="#2D3748" stroke-width="6"/>
    <!-- 窗外建筑剪影 -->
    <rect x="1115" y="450" width="50" height="90" fill="#1A1A2E"/>
    <rect x="1175" y="430" width="35" height="110" fill="#1A1A2E"/>
    <rect x="1220" y="470" width="60" height="70" fill="#1A1A2E"/>
    <rect x="1305" y="440" width="45" height="100" fill="#1A1A2E"/>
    <rect x="1360" y="460" width="55" height="80" fill="#1A1A2E"/>
    <rect x="1425" y="425" width="60" height="115" fill="#1A1A2E"/>
    <!-- 夕阳 -->
    <circle cx="1400" cy="180" r="50" fill="#FF6B35" opacity="0.8"/>
    <circle cx="1400" cy="180" r="35" fill="#FFD93D" opacity="0.9"/>
  </g>

  <!-- 左侧门 -->
  <g>
    <rect x="50" y="100" width="120" height="500" fill="#5D4E37" stroke="#3D2817" stroke-width="6"/>
    <rect x="60" y="115" width="100" height="470" fill="#6B5A40" stroke="#4A3728" stroke-width="3"/>
    <circle cx="155" cy="350" r="8" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  </g>

  <!-- 办公桌面 - 中央 -->
  <g filter="url(#cartoonShadow)">
    <rect x="350" y="500" width="900" height="180" rx="15" fill="url(#deskGrad)"/>
    <rect x="350" y="495" width="900" height="20" rx="8" fill="#9B7E5A"/>
    
    <!-- 电脑显示器 -->
    <g transform="translate(500, 380)">
      <rect x="-80" y="-80" width="160" height="110" rx="8" fill="url(#monitorGrad)" stroke="#000" stroke-width="3"/>
      <rect x="-70" y="-70" width="140" height="90" fill="url(#screenGrad)"/>
      <!-- 屏幕内容 - 工作文档 -->
      <rect x="-60" y="-60" width="120" height="8" rx="2" fill="#EBF5FB" opacity="0.9"/>
      <rect x="-60" y="-45" width="100" height="6" rx="2" fill="#D4E6F1" opacity="0.8"/>
      <rect x="-60" y="-32" width="110" height="6" rx="2" fill="#D4E6F1" opacity="0.8"/>
      <rect x="-60" y="-19" width="90" height="6" rx="2" fill="#D4E6F1" opacity="0.8"/>
      <rect x="-60" y="-6" width="105" height="6" rx="2" fill="#D4E6F1" opacity="0.8"/>
      <rect x="-60" y="7" width="80" height="6" rx="2" fill="#D4E6F1" opacity="0.8"/>
      <!-- 底座 -->
      <rect x="-20" y="30" width="40" height="30" fill="#2D2D2D"/>
      <ellipse cx="0" cy="65" rx="60" ry="12" fill="#1A1A1A"/>
    </g>

    <!-- 键盘 -->
    <g transform="translate(500, 550)">
      <rect x="-90" y="-20" width="180" height="40" rx="6" fill="#3D3D3D" stroke="#1A1A1A" stroke-width="2"/>
      <rect x="-80" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="-60" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="-40" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="-20" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="0" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="20" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="40" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
      <rect x="60" y="-12" width="15" height="10" rx="2" fill="#5A5A5A"/>
    </g>

    <!-- 文件堆 -->
    <g transform="translate(800, 480)">
      <rect x="-50" y="0" width="100" height="20" rx="3" fill="#F5F0E6" stroke="#C9B896" stroke-width="2"/>
      <rect x="-45" y="-8" width="95" height="18" rx="3" fill="#FAF5E8" stroke="#D4C8A0" stroke-width="2" transform="rotate(-3)"/>
      <rect x="-48" y="-18" width="95" height="18" rx="3" fill="#FFFBEB" stroke="#D4C8A0" stroke-width="2" transform="rotate(2)"/>
    </g>

    <!-- 咖啡杯 -->
    <g transform="translate(1050, 550)">
      <ellipse cx="0" cy="-15" rx="35" ry="8" fill="#5D3A1A"/>
      <path d="M -35 -15 L -30 25 Q -30 35 -20 35 L 20 35 Q 30 35 30 25 L 35 -15" fill="#F5E6D3" stroke="#8B7355" stroke-width="2"/>
      <ellipse cx="0" cy="-15" rx="30" ry="6" fill="#6B3410"/>
      <!-- 蒸汽 -->
      <path d="M -15 -25 Q -10 -40 -18 -55 Q -10 -70 -15 -90" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
      <path d="M 0 -25 Q 5 -45 -5 -60 Q 5 -75 0 -95" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
      <path d="M 15 -25 Q 20 -40 12 -55 Q 20 -70 15 -90" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
    </g>
  </g>

  <!-- 老板角色 - 秃顶大肚子 - 压迫感特写 -->
  <g transform="translate(780, 290)" filter="url(#cartoonShadow)">
    <!-- 头 -->
    <ellipse cx="0" cy="0" rx="120" ry="130" fill="#FFDAB9"/>
    <!-- 秃顶亮光 -->
    <ellipse cx="0" cy="-70" rx="80" ry="45" fill="#FFE8D0"/>
    <ellipse cx="-20" cy="-80" rx="25" ry="15" fill="#FFF5E6" opacity="0.7"/>
    <!-- 侧边头发 -->
    <path d="M -110 -20 Q -120 30 -100 60 Q -80 50 -70 20 Q -90 10 -110 -20" fill="#3D2817"/>
    <path d="M 110 -20 Q 120 30 100 60 Q 80 50 70 20 Q 90 10 110 -20" fill="#3D2817"/>
    
    <!-- 眼镜 -->
    <circle cx="-38" cy="10" r="28" fill="white" stroke="#333" stroke-width="4"/>
    <circle cx="38" cy="10" r="28" fill="white" stroke="#333" stroke-width="4"/>
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#333" stroke-width="4"/>
    <!-- 反光 -->
    <ellipse cx="-45" cy="0" rx="8" ry="5" fill="white" opacity="0.6"/>
    <ellipse cx="30" cy="0" rx="8" ry="5" fill="white" opacity="0.6"/>
    
    <!-- 眼睛 - 眯眼假笑 -->
    <path d="M -50 -5 Q -38 -12 -25 -5" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <path d="M 25 -5 Q 38 -12 50 -5" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    
    <!-- 眉毛 -->
    <path d="M -55 -35 Q -40 -45 -20 -38" fill="none" stroke="#4A3020" stroke-width="5" stroke-linecap="round"/>
    <path d="M 20 -38 Q 40 -45 55 -35" fill="none" stroke="#4A3020" stroke-width="5" stroke-linecap="round"/>
    
    <!-- 腮红 - 油腻感 -->
    <ellipse cx="-65" cy="45" rx="20" ry="12" fill="#FFB3B3" opacity="0.5"/>
    <ellipse cx="65" cy="45" rx="20" ry="12" fill="#FFB3B3" opacity="0.5"/>
    
    <!-- 鼻子 -->
    <ellipse cx="0" cy="40" rx="15" ry="12" fill="#F4C4A0"/>
    
    <!-- 嘴巴 - 假笑 -->
    <path d="M -40 70 Q 0 95 40 70 Q 30 85 0 88 Q -30 85 -40 70" fill="#8B4513"/>
    <path d="M -35 72 Q 0 85 35 72" fill="white" opacity="0.8"/>
    
    <!-- 双下巴 -->
    <ellipse cx="0" cy="120" rx="80" ry="25" fill="#F4C4A0" opacity="0.6"/>
    
    <!-- 西装衣服 - 大肚子 -->
    <path d="M -150 130 Q -170 200 -140 280 L 140 280 Q 170 200 150 130 Q 120 125 0 130 Q -120 125 -150 130" fill="#2C3E50"/>
    <!-- 衬衫 -->
    <path d="M -30 130 L 0 200 L 30 130 Q 15 125 0 125 Q -15 125 -30 130" fill="#F5F0E6"/>
    <!-- 领带 -->
    <path d="M -8 145 L 0 250 L 15 250 L 10 145" fill="#8B0000"/>
    <circle cx="3" cy="160" r="5" fill="#FFD700"/>
    <!-- 大肚子 -->
    <ellipse cx="0" cy="220" rx="80" ry="40" fill="#34495E" opacity="0.4"/>
  </g>

  <!-- 妖娆女同事 - 抱臂看戏 -->
  <g transform="translate(1250, 430)" filter="url(#cartoonShadow)">
    <!-- 头 -->
    <ellipse cx="0" cy="0" rx="65" ry="75" fill="#FFDAB9"/>
    <!-- 长发 -->
    <path d="M -55 -35 Q -65 -90 0 -95 Q 65 -90 55 -35 Q 50 -60 0 -65 Q -50 -60 -55 -35" fill="#5D2906"/>
    <path d="M -55 -35 Q -75 40 -60 90 Q -80 60 -70 0 Q -65 -30 -55 -35" fill="#5D2906"/>
    <path d="M 55 -35 Q 75 40 60 90 Q 80 60 70 0 Q 65 -30 55 -35" fill="#5D2906"/>
    <!-- 刘海 -->
    <path d="M -45 -40 Q -20 -65 0 -50 Q 20 -65 45 -40 Q 30 -45 0 -48 Q -30 -45 -45 -40" fill="#5D2906"/>
    
    <!-- 眼睛 - 大眼美妆 -->
    <ellipse cx="-20" cy="5" rx="10" ry="14" fill="white" stroke="#333" stroke-width="2"/>
    <ellipse cx="20" cy="5" rx="10" ry="14" fill="white" stroke="#333" stroke-width="2"/>
    <ellipse cx="-20" cy="8" rx="6" ry="9" fill="#4A2C1A"/>
    <ellipse cx="20" cy="8" rx="6" ry="9" fill="#4A2C1A"/>
    <circle cx="-18" cy="5" r="2" fill="white"/>
    <circle cx="22" cy="5" r="2" fill="white"/>
    <!-- 睫毛 -->
    <path d="M -28 -5 L -32 -12 M -20 -7 L -20 -15 M -12 -5 L -8 -12" stroke="#333" stroke-width="2"/>
    <path d="M 28 -5 L 32 -12 M 20 -7 L 20 -15 M 12 -5 L 8 -12" stroke="#333" stroke-width="2"/>
    
    <!-- 眼影 -->
    <path d="M -30 -8 Q -20 -18 -10 -8" fill="#FF69B4" opacity="0.3"/>
    <path d="M 10 -8 Q 20 -18 30 -8" fill="#FF69B4" opacity="0.3"/>
    
    <!-- 眉毛 -->
    <path d="M -30 -20 Q -18 -28 -8 -22" fill="none" stroke="#5D2906" stroke-width="4" stroke-linecap="round"/>
    <path d="M 8 -22 Q 18 -28 30 -20" fill="none" stroke="#5D2906" stroke-width="4" stroke-linecap="round"/>
    
    <!-- 腮红 -->
    <ellipse cx="-35" cy="30" rx="15" ry="10" fill="#FF9999" opacity="0.6"/>
    <ellipse cx="35" cy="30" rx="15" ry="10" fill="#FF9999" opacity="0.6"/>
    
    <!-- 红唇 -->
    <ellipse cx="0" cy="50" rx="15" ry="10" fill="#E91E63"/>
    <ellipse cx="0" cy="48" rx="12" ry="6" fill="#F48FB1" opacity="0.6"/>
    
    <!-- 紧身连衣裙 -->
    <path d="M -60 70 Q -70 120 -50 180 L 50 180 Q 70 120 60 70 Q 40 65 0 68 Q -40 65 -60 70" fill="#8B2635"/>
    <path d="M -45 75 Q -30 90 -15 80 Q -30 85 -45 75" fill="#C9A86C" opacity="0.3"/>
    
    <!-- 抱臂手势 -->
    <ellipse cx="-30" cy="150" rx="35" ry="20" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
    <ellipse cx="30" cy="150" rx="35" ry="20" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
  </g>

  <!-- 远处同事探头围观 -->
  <g transform="translate(250, 550)" filter="url(#cartoonShadow)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="45" ry="50" fill="#FFDAB9"/>
    <path d="M -40 -25 Q -45 -60 0 -65 Q 45 -60 40 -25" fill="#2C3E50"/>
    <ellipse cx="-12" cy="-5" rx="4" ry="6" fill="#333"/>
    <ellipse cx="12" cy="-5" rx="4" ry="6" fill="#333"/>
    <path d="M -15 20 Q 0 30 15 20" fill="none" stroke="#333" stroke-width="3"/>
    <rect x="-40" y="45" width="80" height="50" rx="5" fill="#5D4E37"/>
  </g>

  <!-- 前景 - 玩家双手+公文包 (第一人称视角) -->
  <g transform="translate(400, 780)">
    <!-- 公文包 -->
    <ellipse cx="-30" cy="0" rx="80" ry="30" fill="#5D4037"/>
    <rect x="-110" y="-40" width="160" height="40" rx="8" fill="#795548" stroke="#3E2723" stroke-width="3"/>
    <rect x="-40" y="-55" width="30" height="20" rx="5" fill="#8D6E63" stroke="#3E2723" stroke-width="2"/>
    <circle cx="-25" cy="-45" r="5" fill="#FFD700"/>
  </g>
  <g transform="translate(1200, 780)">
    <ellipse cx="0" cy="0" rx="100" ry="35" fill="#FFDAB9" opacity="0.9"/>
    <rect x="-80" y="-30" width="100" height="60" rx="10" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
  </g>

  <!-- 漫画速度线 -->
  <g opacity="0.2">
    <line x1="600" y1="50" x2="750" y2="250" stroke="white" stroke-width="2"/>
    <line x1="700" y1="30" x2="800" y2="200" stroke="white" stroke-width="3"/>
    <line x1="1300" y1="100" x2="1150" y2="300" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- 装饰元素 -->
  <g opacity="0.5">
    <circle cx="100" cy="800" r="8" fill="#FFD700"/>
    <circle cx="1500" cy="820" r="10" fill="#87CEEB"/>
  </g>

  <!-- 地毯 -->
  <rect x="0" y="700" width="1600" height="300" fill="#5D4037"/>
  <rect x="0" y="700" width="1600" height="20" fill="#4E342E"/>
</svg>