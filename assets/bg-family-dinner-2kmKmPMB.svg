<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A87C"/>
      <stop offset="60%" stop-color="#C97B5B"/>
      <stop offset="100%" stop-color="#8B5539"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#3D2817"/>
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE8A0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFE8A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D99D"/>
      <stop offset="50%" stop-color="#E8BC71"/>
      <stop offset="100%" stop-color="#C99645"/>
    </linearGradient>
    <radialGradient id="hotPot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE0B3"/>
      <stop offset="100%" stop-color="#D4A854"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景墙 -->
  <rect width="1600" height="1000" fill="url(#wallGrad)"/>
  
  <!-- 装饰 - 春节灯笼 -->
  <g opacity="0.7">
    <ellipse cx="150" cy="180" rx="45" ry="55" fill="#D4342A" stroke="#8B1A15" stroke-width="4"/>
    <ellipse cx="150" cy="180" rx="30" ry="40" fill="#E85A45" opacity="0.5"/>
    <rect x="135" y="115" width="30" height="15" fill="#FFD700"/>
    <rect x="140" y="240" width="20" height="30" fill="#FFD700"/>
    <line x1="150" y1="130" x2="150" y2="80" stroke="#8B5A2B" stroke-width="3"/>
  </g>
  <g opacity="0.7">
    <ellipse cx="1450" cy="180" rx="45" ry="55" fill="#D4342A" stroke="#8B1A15" stroke-width="4"/>
    <ellipse cx="1450" cy="180" rx="30" ry="40" fill="#E85A45" opacity="0.5"/>
    <rect x="1435" y="115" width="30" height="15" fill="#FFD700"/>
    <rect x="1440" y="240" width="20" height="30" fill="#FFD700"/>
    <line x1="1450" y1="130" x2="1450" y2="80" stroke="#8B5A2B" stroke-width="3"/>
  </g>

  <!-- 福字装饰 -->
  <g transform="translate(750, 90)" opacity="0.8">
    <rect x="-50" y="-50" width="100" height="100" fill="#D4342A" transform="rotate(45)" stroke="#FFD700" stroke-width="3"/>
    <text x="0" y="20" text-anchor="middle" font-size="60" font-family="KaiTi, serif" fill="#FFD700" font-weight="bold" transform="rotate(45)">福</text>
  </g>

  <!-- 灯光光晕 -->
  <rect width="1600" height="1000" fill="url(#lampGlow)"/>
  
  <!-- 地板 -->
  <rect y="720" width="1600" height="280" fill="url(#floorGrad)"/>

  <!-- 圆桌 -->
  <g filter="url(#shadow)">
    <ellipse cx="800" cy="550" rx="550" ry="120" fill="#8B5A2B" opacity="0.4"/>
    <ellipse cx="800" cy="500" rx="520" ry="100" fill="url(#tableGrad)" stroke="#8B5A2B" stroke-width="6"/>
    <ellipse cx="800" cy="495" rx="500" ry="90" fill="#FFF4D9" opacity="0.3"/>
    
    <!-- 旋转玻璃台 -->
    <ellipse cx="800" cy="485" rx="350" ry="60" fill="#F5E6C8" stroke="#D4B87C" stroke-width="3"/>
    
    <!-- 年夜饭菜肴 - 鱼 -->
    <g transform="translate(700, 470)">
      <ellipse cx="0" cy="0" rx="70" ry="25" fill="#FFE4B5" stroke="#D2691E" stroke-width="2"/>
      <ellipse cx="-55" cy="-5" rx="20" ry="18" fill="#FFA07A"/>
      <circle cx="-60" cy="-8" r="4" fill="#333"/>
      <path d="M 55 -5 Q 70 -20 85 -5 Q 70 0 55 5" fill="#FFA07A"/>
      <ellipse cx="20" cy="5" rx="15" ry="8" fill="#FF6347" opacity="0.6"/>
      <ellipse cx="-10" cy="5" rx="12" ry="6" fill="#90EE90" opacity="0.7"/>
    </g>
    
    <!-- 饺子盘 -->
    <g transform="translate(950, 465)">
      <ellipse cx="0" cy="0" rx="55" ry="20" fill="#FFFAF0" stroke="#DEB887" stroke-width="2"/>
      <ellipse cx="-25" cy="-3" rx="18" ry="10" fill="#FFF8DC" stroke="#C9A86C" stroke-width="1.5"/>
      <ellipse cx="0" cy="-5" rx="18" ry="10" fill="#FFF8DC" stroke="#C9A86C" stroke-width="1.5"/>
      <ellipse cx="25" cy="-3" rx="18" ry="10" fill="#FFF8DC" stroke="#C9A86C" stroke-width="1.5"/>
      <path d="M -30 -3 Q -25 -10 -20 -3" fill="none" stroke="#C9A86C" stroke-width="1"/>
      <path d="M -5 -5 Q 0 -12 5 -5" fill="none" stroke="#C9A86C" stroke-width="1"/>
      <path d="M 20 -3 Q 25 -10 30 -3" fill="none" stroke="#C9A86C" stroke-width="1"/>
    </g>
    
    <!-- 热气腾腾的火锅 -->
    <g transform="translate(800, 440)">
      <ellipse cx="0" cy="20" rx="90" ry="30" fill="#8B4513" stroke="#5D3A1A" stroke-width="4"/>
      <path d="M -90 20 Q -95 50 -80 60 L 80 60 Q 95 50 90 20" fill="#6B3410"/>
      <ellipse cx="0" cy="18" rx="85" ry="25" fill="#DC143C" opacity="0.9"/>
      <circle cx="-30" cy="15" r="8" fill="#FF6347" opacity="0.8"/>
      <circle cx="25" cy="20" r="7" fill="#FF8C00" opacity="0.8"/>
      <circle cx="0" cy="8" r="5" fill="#90EE90" opacity="0.9"/>
      <circle cx="40" cy="12" r="6" fill="#FFD700" opacity="0.8"/>
      <!-- 蒸汽 -->
      <path d="M -20 -5 Q -15 -30 -25 -50 Q -15 -70 -20 -100" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
      <path d="M 0 -10 Q 5 -35 -5 -60 Q 5 -80 0 -110" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
      <path d="M 20 -5 Q 25 -30 15 -50 Q 25 -70 20 -100" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
    </g>
    
    <!-- 饮料杯 -->
    <g transform="translate(600, 490)">
      <rect x="-12" y="-20" width="24" height="35" rx="4" fill="#FFF8DC" stroke="#C9A86C" stroke-width="2"/>
      <rect x="-10" y="-18" width="20" height="15" fill="#FFD700" opacity="0.7"/>
      <ellipse cx="0" cy="-20" rx="12" ry="4" fill="#F5DEB3"/>
    </g>
    <g transform="translate(1000, 490)">
      <rect x="-12" y="-20" width="24" height="35" rx="4" fill="#FFF8DC" stroke="#C9A86C" stroke-width="2"/>
      <rect x="-10" y="-18" width="20" height="15" fill="#FFE4B5" opacity="0.7"/>
      <ellipse cx="0" cy="-20" rx="12" ry="4" fill="#F5DEB3"/>
    </g>
  </g>

  <!-- 大姑角色 - 左上特写 -->
  <g transform="translate(300, 280)" filter="url(#shadow)">
    <!-- 头部 -->
    <ellipse cx="0" cy="0" rx="110" ry="125" fill="#FFDAB9"/>
    <!-- 头发 -->
    <path d="M -100 -40 Q -110 -120 0 -130 Q 110 -120 100 -40 Q 90 -80 50 -90 Q 0 -100 -50 -90 Q -90 -80 -100 -40" fill="#4A2C1A"/>
    <ellipse cx="-80" cy="-20" rx="30" ry="40" fill="#4A2C1A"/>
    <ellipse cx="80" cy="-20" rx="30" ry="40" fill="#4A2C1A"/>
    <!-- 眼镜 -->
    <circle cx="-35" cy="5" r="25" fill="white" stroke="#333" stroke-width="3"/>
    <circle cx="35" cy="5" r="25" fill="white" stroke="#333" stroke-width="3"/>
    <line x1="-10" y1="5" x2="10" y2="5" stroke="#333" stroke-width="3"/>
    <!-- 眼睛 -->
    <ellipse cx="-35" cy="5" rx="8" ry="10" fill="#333"/>
    <ellipse cx="35" cy="5" rx="8" ry="10" fill="#333"/>
    <circle cx="-33" cy="2" r="3" fill="white"/>
    <circle cx="37" cy="2" r="3" fill="white"/>
    <!-- 眉毛 - 挑起来 -->
    <path d="M -55 -25 Q -35 -35 -15 -28" fill="none" stroke="#4A2C1A" stroke-width="5" stroke-linecap="round"/>
    <path d="M 15 -28 Q 35 -35 55 -25" fill="none" stroke="#4A2C1A" stroke-width="5" stroke-linecap="round"/>
    <!-- 腮红 -->
    <ellipse cx="-60" cy="40" rx="25" ry="15" fill="#FF9999" opacity="0.5"/>
    <ellipse cx="60" cy="40" rx="25" ry="15" fill="#FF9999" opacity="0.5"/>
    <!-- 嘴巴 - 张大说话 -->
    <ellipse cx="0" cy="70" rx="28" ry="30" fill="#8B0000"/>
    <ellipse cx="0" cy="75" rx="20" ry="20" fill="#FF6B6B"/>
    <path d="M -25 60 Q 0 80 25 60" fill="none" stroke="#C9A86C" stroke-width="2"/>
    <!-- 红色唐装衣服 -->
    <path d="M -130 100 Q -140 180 -130 240 L 130 240 Q 140 180 130 100 Q 100 90 0 95 Q -100 90 -130 100" fill="#B22222"/>
    <circle cx="-60" cy="160" r="8" fill="#FFD700"/>
    <circle cx="60" cy="160" r="8" fill="#FFD700"/>
    <!-- 手指向前 - 压迫感 -->
    <g transform="translate(100, 180) rotate(20)">
      <ellipse cx="30" cy="0" rx="50" ry="15" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
      <rect x="0" y="-15" width="40" height="30" rx="8" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
    </g>
  </g>

  <!-- 围观亲戚1 - 右上 -->
  <g transform="translate(1150, 310)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="75" ry="85" fill="#FFDAB9"/>
    <!-- 头发 - 中年男性 -->
    <path d="M -65 -30 Q -70 -85 0 -90 Q 70 -85 65 -30 Q 55 -60 0 -65 Q -55 -60 -65 -30" fill="#3D2817"/>
    <!-- 眼镜 -->
    <circle cx="-22" cy="5" r="18" fill="white" stroke="#555" stroke-width="2"/>
    <circle cx="22" cy="5" r="18" fill="white" stroke="#555" stroke-width="2"/>
    <line x1="-5" y1="5" x2="5" y2="5" stroke="#555" stroke-width="2"/>
    <!-- 眼睛 -->
    <ellipse cx="-22" cy="5" rx="6" ry="8" fill="#333"/>
    <ellipse cx="22" cy="5" rx="6" ry="8" fill="#333"/>
    <!-- 挑眉 -->
    <path d="M -38 -20 Q -20 -28 -5 -22" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <path d="M 5 -22 Q 25 -28 38 -20" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <!-- 坏笑嘴巴 -->
    <path d="M -25 45 Q 0 65 25 45 Q 0 55 -25 45" fill="#8B4513"/>
    <!-- 衣服 -->
    <path d="M -85 70 Q -95 130 -80 180 L 80 180 Q 95 130 85 70 Q 60 65 0 68 Q -60 65 -85 70" fill="#4A5D23"/>
    <!-- 领带 -->
    <path d="M -5 78 L 0 120 L 8 120 L 5 78" fill="#8B0000"/>
  </g>

  <!-- 围观亲戚2 - 右中 -->
  <g transform="translate(1350, 450)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="60" ry="70" fill="#FFDAB9"/>
    <!-- 女式头发 -->
    <path d="M -55 -25 Q -60 -70 0 -75 Q 60 -70 55 -25 Q 50 -50 0 -55 Q -50 -50 -55 -25" fill="#2C1810"/>
    <path d="M -55 -25 Q -65 30 -50 50" fill="#2C1810"/>
    <path d="M 55 -25 Q 65 30 50 50" fill="#2C1810"/>
    <!-- 眼睛 -->
    <ellipse cx="-18" cy="0" rx="5" ry="7" fill="#333"/>
    <ellipse cx="18" cy="0" rx="5" ry="7" fill="#333"/>
    <circle cx="-16" cy="-2" r="2" fill="white"/>
    <circle cx="20" cy="-2" r="2" fill="white"/>
    <!-- 坏笑 - 眯眼 -->
    <path d="M -25 -8 Q -18 -12 -10 -8" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <path d="M 10 -8 Q 18 -12 25 -8" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- 腮红 -->
    <ellipse cx="-35" cy="25" rx="15" ry="10" fill="#FF9999" opacity="0.5"/>
    <ellipse cx="35" cy="25" rx="15" ry="10" fill="#FF9999" opacity="0.5"/>
    <!-- 幸灾乐祸的笑 -->
    <path d="M -18 35 Q 0 55 18 35" fill="#8B4513"/>
    <!-- 衣服 -->
    <path d="M -65 55 Q -75 100 -60 140 L 60 140 Q 75 100 65 55 Q 45 50 0 53 Q -45 50 -65 55" fill="#DAA520"/>
  </g>

  <!-- 围观亲戚3 - 左中 -->
  <g transform="translate(120, 430)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="65" ry="75" fill="#FFDAB9"/>
    <!-- 头发 -->
    <path d="M -55 -30 Q -60 -75 0 -80 Q 60 -75 55 -30 Q 50 -55 0 -60 Q -50 -55 -55 -30" fill="#D4A574"/>
    <!-- 眼睛 - 睁大好奇 -->
    <ellipse cx="-18" cy="0" rx="7" ry="9" fill="white" stroke="#333" stroke-width="2"/>
    <ellipse cx="18" cy="0" rx="7" ry="9" fill="white" stroke="#333" stroke-width="2"/>
    <circle cx="-18" cy="2" r="5" fill="#333"/>
    <circle cx="18" cy="2" r="5" fill="#333"/>
    <circle cx="-16" cy="0" r="2" fill="white"/>
    <circle cx="20" cy="0" r="2" fill="white"/>
    <!-- 嘴巴 - 吃瓜围观 -->
    <circle cx="0" cy="40" r="12" fill="#8B0000"/>
    <!-- 衣服 -->
    <path d="M -70 60 Q -80 110 -65 150 L 65 150 Q 80 110 70 60 Q 50 55 0 58 Q -50 55 -70 60" fill="#6B4226"/>
  </g>

  <!-- 前景 - 玩家的手(第一人称视角) -->
  <g transform="translate(400, 780)">
    <ellipse cx="0" cy="0" rx="130" ry="35" fill="#FFDAB9" opacity="0.9"/>
    <rect x="-10" y="-25" width="60" height="50" rx="10" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
    <line x1="-5" y1="0" x2="50" y2="0" stroke="#E8B89C" stroke-width="1"/>
  </g>
  <g transform="translate(1200, 780)">
    <ellipse cx="0" cy="0" rx="130" ry="35" fill="#FFDAB9" opacity="0.9"/>
    <rect x="-50" y="-25" width="60" height="50" rx="10" fill="#FFDAB9" stroke="#D4A574" stroke-width="2"/>
    <line x1="-50" y1="0" x2="5" y2="0" stroke="#E8B89C" stroke-width="1"/>
  </g>

  <!-- 漫画速度线 - 增强压迫感 -->
  <g opacity="0.15">
    <line x1="100" y1="100" x2="200" y2="200" stroke="white" stroke-width="2"/>
    <line x1="200" y1="80" x2="350" y2="220" stroke="white" stroke-width="3"/>
    <line x1="1500" y1="120" x2="1350" y2="250" stroke="white" stroke-width="2"/>
    <line x1="1400" y1="90" x2="1200" y2="200" stroke="white" stroke-width="3"/>
  </g>
  
  <!-- 装饰 - 春节氛围小元素 -->
  <g opacity="0.6">
    <text x="100" y="680" font-size="40" fill="#FFD700">✦</text>
    <text x="1450" y="680" font-size="40" fill="#FFD700">✦</text>
    <text x="780" y="670" font-size="30" fill="#FFE4B5">♦</text>
  </g>

  <!-- 底部暗角 -->
  <rect x="0" y="0" width="1600" height="1000" fill="url(#vignette)" opacity="0"/>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
</svg>